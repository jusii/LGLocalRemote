<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>LG Local Remote</title>
    <script src="./js/webOS.js" type="text/javascript"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; font-family: monospace; font-size: 22px;
            overflow: hidden;
        }
        #status {
            position: absolute; inset: 0; padding: 40px; z-index: 1;
            transition: opacity 0.2s;
        }
        #status.hidden { opacity: 0; pointer-events: none; }
        .row { margin-bottom: 10px; }
        .label { color: #888; display: inline-block; min-width: 180px; }
        .value { color: #0f0; }
        .warn { color: #fc0; }
        .err { color: #f44; }
        h1 { color: #0f0; margin: 0 0 30px 0; font-size: 28px; }
        #log {
            margin-top: 24px; padding-top: 16px; border-top: 1px solid #222;
            font-size: 14px; color: #6c6; white-space: pre-wrap;
            height: 40vh; overflow-y: auto;
        }
        #view-layer {
            position: absolute; inset: 0; z-index: 10; background: #000;
            display: none;
        }
        #view-layer.active { display: block; }
        #view-layer video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: contain; background: #000;
        }
        #view-badge {
            position: absolute; right: 16px; bottom: 16px; z-index: 20;
            padding: 4px 10px; background: rgba(0, 0, 0, 0.6); color: #0f0;
            font-family: monospace; font-size: 14px; border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="status">
        <h1>LG Local Remote</h1>
        <div class="row"><span class="label">App:</span> <span class="value">com.lg.app.signage.dev</span></div>
        <div class="row"><span class="label">Service:</span> <span class="value" id="svc-status">starting&hellip;</span></div>
        <div class="row"><span class="label">HTTP listener:</span> <span class="value" id="http-status">&mdash;</span></div>
        <div class="row"><span class="label">HTTP port:</span> <span class="value" id="http-port">&mdash;</span></div>
        <div class="row"><span class="label">Uptime:</span> <span class="value" id="uptime">&mdash;</span></div>
        <div class="row"><span class="label">Last screenshot:</span> <span class="value" id="last-cap">&mdash;</span></div>
        <div class="row"><span class="label">Last input change:</span> <span class="value" id="last-inp">&mdash;</span></div>
        <div class="row"><span class="label">View layer:</span> <span class="value" id="view-state">status UI</span></div>
        <div id="log"></div>
    </div>
    <div id="view-layer"></div>
    <script>
        var SERVICE_URI = 'luna://com.lg.app.signage.dev.remote/';
        var $ = function (id) { return document.getElementById(id); };
        var logEl = $('log');
        var statusEl = $('status');
        var viewLayer = $('view-layer');
        var currentViewSrc = null;

        function log(msg) {
            var ts = new Date().toISOString().substring(11, 19);
            logEl.textContent += '[' + ts + '] ' + msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(id, text, cls) {
            var el = $(id);
            el.textContent = text;
            el.className = 'value' + (cls ? ' ' + cls : '');
        }

        // Render / tear down the fullscreen <video src="ext://..."> overlay.
        function applyView(view) {
            var desiredSrc = view && view.src ? view.src : null;
            if (desiredSrc === currentViewSrc) return;
            currentViewSrc = desiredSrc;

            // Clear current video + badge.
            viewLayer.innerHTML = '';
            viewLayer.classList.toggle('active', !!desiredSrc);
            statusEl.classList.toggle('hidden', !!desiredSrc);
            setStatus('view-state', desiredSrc ? desiredSrc : 'status UI');

            if (!desiredSrc) return;

            // Per LG docs: a <video> element with a child <source src="ext://hdmi:N">
            // composites the external input feed into the page.
            var video = document.createElement('video');
            video.autoplay = true;
            video.muted = true;
            video.setAttribute('playsinline', '');
            var source = document.createElement('source');
            source.setAttribute('src', desiredSrc);
            video.appendChild(source);
            viewLayer.appendChild(video);

            var badge = document.createElement('div');
            badge.id = 'view-badge';
            badge.textContent = desiredSrc;
            viewLayer.appendChild(badge);

            // Kick playback in case autoplay is gated.
            try { video.play && video.play().catch(function (e) { log('video.play rejected: ' + (e && e.message)); }); }
            catch (e) { log('video.play threw: ' + e.message); }

            log('view → ' + desiredSrc);
        }

        function pingService() {
            if (typeof webOS === 'undefined' || !webOS.service) {
                setStatus('svc-status', 'no webOS.service bridge', 'err');
                return;
            }
            webOS.service.request(SERVICE_URI, {
                method: 'ping',
                parameters: {},
                onSuccess: function (res) {
                    setStatus('svc-status', 'up');
                    setStatus('http-status', res.httpReady ? 'listening' : 'not bound', res.httpReady ? null : 'err');
                    setStatus('http-port', String(res.httpPort || '?'));
                    setStatus('uptime', (res.uptimeSeconds || 0) + 's');
                    if (res.lastCapture) setStatus('last-cap', res.lastCapture.at + ' (' + (res.lastCapture.bytes || '?') + 'B)');
                    if (res.lastInput) setStatus('last-inp', res.lastInput.at + ' — ' + res.lastInput.type + ':' + res.lastInput.index);
                    applyView(res.view);
                },
                onFailure: function (err) {
                    setStatus('svc-status', 'error', 'err');
                    log('ping failed: ' + JSON.stringify(err));
                }
            });
        }

        pingService();
        // Faster poll so /view responds within ~1s instead of 3s.
        setInterval(pingService, 1000);
    </script>
</body>
</html>
